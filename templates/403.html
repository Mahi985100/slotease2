{% extends "base.html" %}
{% block title %}Access denied · SlotEase{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-[#1A1A2E] border border-[#2D2D4E] rounded-lg p-6 text-center">
  <h1 class="text-xl font-bold text-red-600 mb-2">Access denied</h1>
  <p class="text-sm text-slate-300 mb-4">
    {{ exception|default:"You don't have permission to perform this action." }}
  </p>
  <a href="{% url 'dashboard' %}" class="text-[#C084FC]">&larr; Back to dashboard</a>
</div>
{% endblock %}
